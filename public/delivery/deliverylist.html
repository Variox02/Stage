<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Livraisons à effectuer — Fournaise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
    <link href="../css/style.css" rel="stylesheet" />
    <link href="../css/admin.css" rel="stylesheet" />
</head>
<body class="admin-body">

    <!-- NavBar -->
    <nav id="navbar" class="navbar navbar-expand-lg fixed-top py-0" style="height:64px;">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-2" href="../index.html">
                Fournaise <small>Espace livreur</small>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto align-items-center gap-3">
                    <li class="nav-item"><a class="nav-link admin-nav-active" href="deliverylist.html">🛵 Livraisons</a></li>
                    <li id="nav-auth-zone" class="d-flex align-items-center gap-3 list-unstyled mb-0"></li>
                </ul>
            </div>
        </div>
    </nav>

    <main style="padding-top:64px; min-height:100vh;">
        <div class="container-fluid px-4 py-5">

            <!-- En-tête -->
            <div class="d-flex justify-content-between align-items-center mb-5 flex-wrap gap-3">
                <div>
                    <p class="eyebrow mb-1">Espace livreur</p>
                    <h2 class="display-5 mb-0">Commandes à livrer</h2>
                </div>
                <div class="d-flex gap-2">
                    <input type="text" class="admin-search" placeholder="🔍 Rechercher par adresse..." id="search-input" />
                </div>
            </div>

            <!-- Statistiques rapides -->
            <div class="row g-3 mb-5">
                <div class="col-sm-6 col-lg-3">
                    <div class="admin-stat-card">
                        <span class="admin-stat-icon">📦</span>
                        <div>
                            <div class="admin-stat-value" id="stat-total">—</div>
                            <div class="admin-stat-label">Commandes en attente</div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6 col-lg-3">
                    <div class="admin-stat-card admin-stat-card--warn">
                        <span class="admin-stat-icon">🛵</span>
                        <div>
                            <div class="admin-stat-value" id="stat-pris">—</div>
                            <div class="admin-stat-label">Déjà pris en charge</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Spinner -->
            <div id="delivery-spinner" class="d-flex justify-content-center py-5">
                <div class="spinner-fournaise"></div>
            </div>

            <div id="delivery-error" class="alert alert-danger d-none text-center" role="alert"></div>

            <!-- Liste des commandes (cartes) -->
            <div class="row g-4" id="delivery-grid">
                <!-- Les cartes de commande seront générées dynamiquement en JS -->
            </div>

            <!-- Message si aucune commande -->
            <div id="delivery-empty" class="text-center py-5 d-none">
                <p class="fs-1 mb-2">🛵</p>
                <p class="fw-light" style="color:var(--texte-muted);">Aucune commande en attente de livraison pour le moment.</p>
            </div>

        </div>
    </main>

    <footer class="py-4" style="background:var(--texte);">
        <div class="container-fluid px-4">
            <div class="text-center" style="color:rgba(245,237,216,.35); font-size:.78rem;">
                © 2026 Fournaise — Espace livreur
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../js/deliverylist.js"></script>

    <!-- Modal détail commande -->
    <div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">📦 Commande <span id="detail-order-id"></span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="field-group mb-3">
                        <label class="field-label">Adresse de livraison</label>
                        <p class="mb-0" id="detail-address">—</p>
                    </div>
                    <div class="field-group mb-3">
                        <label class="field-label">Téléphone</label>
                        <p class="mb-0" id="detail-phone">—</p>
                    </div>
                    <div class="field-group mb-3">
                        <label class="field-label">Articles</label>
                        <ul class="mb-0 ps-3" id="detail-items"></ul>
                    </div>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="fw-bold">Total</span>
                        <span class="admin-price" id="detail-total">—</span>
                    </div>
                </div>
                <div class="modal-footer justify-content-between">
                    <button class="btn btn-outline-danger d-none" id="btn-cancel-delivery">Annuler la prise en charge</button>
                    <button class="btn btn-rouge" id="btn-take-delivery">🛵 Prendre cette commande</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
